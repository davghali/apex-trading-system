services:
  # Python Analysis Engine
  - type: web
    name: apex-engine
    runtime: python
    rootDir: packages/engine
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: OANDA_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
    plan: free

  # Node.js Server + React Frontend
  - type: web
    name: apex-dashboard
    runtime: node
    buildCommand: npm install && cd packages/client && npx vite build
    startCommand: cd packages/server && npx tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENGINE_URL
        fromService:
          name: apex-engine
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: NODE_VERSION
        value: "20.20.2"
    plan: free
